    <image href="equipment-apron.svg" x="45" y="80" width="730" height="584" preserveAspectRatio="xMidYMid meet"/>
    <text x="32" y="52">おてつだいエプロン</text>
  </g>
  <g transform="translate(490 1460)">
    <rect class="frame" x="0" y="0" width="820" height="620" rx="20"/>
    <image href="../hounyan-home.png" x="45" y="80" width="730" height="584" preserveAspectRatio="xMidYMid meet"/>
    <image href="equipment-space-suit.svg" x="45" y="80" width="730" height="584" preserveAspectRatio="xMidYMid meet"/>
